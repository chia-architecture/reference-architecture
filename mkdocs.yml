site_name: Caribbean Healthcare Interoperability Architecture
site_description: Caribbean Healthcare Interoperability Architecture
repo_url: https://github.com/chia-architecture/reference-architecture
repo_name: chia-architecture/reference-architecture
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/brand/logo-simple.svg
  favicon: assets/brand/logo-simple.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: 
      - Home: index.md
      - Context: purpose/index.md
      - Objective and scope: purpose/scope-objective.md
      - Approach: purpose/approach.md
  - Architecture Principles: 
      - Introduction: principles/index.md
      - People-centred care: principles/01-principle.md
      - Value-driven: principles/02-principle.md
      - International: principles/03-principle.md
      - Reuse before buy: principles/04-principle.md
      - Secure and robust: principles/05-principle.md
      - Standardized: principles/06-principle.md
      - Flexible: principles/07-principle.md
      - Decouplable: principles/08-principle.md
      - Single registration: principles/09-principle.md
      - Continuity: principles/10-principle.md
  - Reference Architecture:
      - Introduction: reference-architecture/index.md
      - Terminology: reference-architecture/terminology.md
      - Services: reference-architecture/services.md
      - Building blocks: reference-architecture/building-blocks.md
      - Interaction models: reference-architecture/interaction-models.md
      - Architecture decision records: reference-architecture/architecture-decision-records.md
      - Related initiatives: reference-architecture/related-initiatives.md
  - Use Cases:
      - Introduction: use-cases/index.md
      - Cerival cancer screening: use-cases/screening-cervicalcancer.md
      - Breast cancer screening: use-cases/screening-breastcancer.md
      - Planned referral: use-cases/planned-referral.md
      - Advanced Laboratory Services: use-cases/laboratoryservices-microbiology.md
      - Emergency Response: use-cases/publichealth-emergencyresponse.md
      - Medicines Regulatory Approval: use-cases/medicines-regulatory-approval.md
      - Medicines Quality Testing: use-cases/medicines-quality-testing.md
      - Pharmacovigilance: use-cases/pharmacovigilance.md
  - Contribute: contribute.md
  - About: about.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
