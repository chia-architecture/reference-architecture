site_name: Caribbean Healthcare Interoperability Architecture
site_description: Caribbean Healthcare Interoperability Architecture
repo_url: https://github.com/chia-architecture/reference-architecture
repo_name: chia-architecture/reference-architecture

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Purpose: purpose.md
  - Principles: principles.md
  - Reference Architecture: reference-architecture.md
  - Governance: governance.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Cross-Border Emergency Care: use-cases/cross-border-emergency-care.md
      - Planned Referral: use-cases/planned-referral.md
      - Specialist Consultation: use-cases/specialist-consultation.md
  - Contribute: contribute.md
  - About: about.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
