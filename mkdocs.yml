site_name: Caribbean Healthcare Interoperability Architecture
site_description: Caribbean Healthcare Interoperability Architecture
repo_url: https://github.com/chia-architecture/reference-architecture
repo_name: chia-architecture/reference-architecture
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Purpose: purpose.md
  - Principles: 
      - Introduction: principles/index.md
      - 01 Principle: principles/01-principle.md
      - 02 Principle: principles/02-principle.md
      - 03 Principle: principles/03-principle.md
      - 04 Principle: principles/04-principle.md
      - 05 Principle: principles/05-principle.md
      - 06 Principle: principles/06-principle.md
      - 07 Principle: principles/07-principle.md
      - 08 Principle: principles/08-principle.md
      - 09 Principle: principles/09-principle.md
      - 10 Principle: principles/10-principle.md
  - Reference Architecture:
      - Introduction: reference-architecture/index.md
      - Terminology: reference-architecture/terminology.md
      - Architecture view: reference-architecture/architecture-view.md
      - Building blocks: reference-architecture/building-blocks.md
      - Related initiatives: reference-architecture/related-initiatives.md
  - Governance: governance.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Cross-Border Emergency Care: use-cases/cross-border-emergency-care.md
      - Planned Referral: use-cases/planned-referral.md
      - Specialist Consultation: use-cases/specialist-consultation.md
  - Contribute: contribute.md
  - About: about.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
